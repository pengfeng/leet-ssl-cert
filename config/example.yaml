account:
  email: admin@example.com

acme:
  directory_url: https://acme-v02.api.letsencrypt.org/directory
  key_size: 2048
  renewal_days: 30

storage:
  base_dir: ~/.leet-ssl-cert/certs

certificates:
  - name: my-site
    domains:
      - example.com
      - www.example.com
    dns_provider: aliyun
    deploy:
      - provider: aliyun_clb
        region: cn-hangzhou
        load_balancer_id: lb-xxxxxxxxxxxxx
        listener_port: 443

  - name: api-site
    domains:
      - api.example.com
    dns_provider: aws
    deploy:
      - provider: aws_acm
        region: us-east-1

  - name: app-site
    domains:
      - app.example.com
    dns_provider: gcp
    deploy:
      - provider: gcp_lb
        project: my-gcp-project
        scope: global
        target_https_proxy: edge-proxy

providers:
  aliyun:
    access_key_id: ${ALICLOUD_ACCESS_KEY_ID}
    access_key_secret: ${ALICLOUD_ACCESS_KEY_SECRET}
  aws: {}
  gcp:
    project: ${GOOGLE_CLOUD_PROJECT}
